<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>CodeFinder Admin</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#050816;
            color:white;
            padding:20px;
            overflow-x:hidden;
        }

        .title{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            color:#00ffee;
            text-shadow:0 0 20px #00ffee;
            margin-bottom:30px;
        }

        .top-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:#0f172a;
            border:1px solid #00ffee55;
            border-radius:20px;
            padding:25px;
            box-shadow:0 0 20px #00ffee22;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0 0 30px #00ffee88;
        }

        .card h2{
            color:#00ffee;
            margin-bottom:10px;
        }

        .card p{
            font-size:28px;
            font-weight:bold;
        }

        .panel{
            background:#0f172a;
            border-radius:20px;
            padding:25px;
            margin-bottom:30px;
            box-shadow:0 0 20px #00ffee22;
        }

        .panel h3{
            margin-bottom:20px;
            color:#00ffee;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#111827;
            color:white;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#00ffee;
            color:black;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:white;
            transform:scale(1.02);
        }

        .data-box{
            background:#0b1120;
            border-radius:15px;
            padding:15px;
            margin-top:10px;
            overflow:auto;
            max-height:500px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#00ffee;
            color:black;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #1e293b;
            text-align:center;
        }

        .delete-btn{
            background:red;
            color:white;
            padding:8px 14px;
            border-radius:8px;
            text-decoration:none;
            font-size:14px;
        }

        .delete-btn:hover{
            background:#ff4444;
        }

        .logout{
            position:fixed;
            top:20px;
            right:20px;
            background:red;
            color:white;
            padding:12px 18px;
            border-radius:12px;
            text-decoration:none;
            font-weight:bold;
        }

        .logout:hover{
            background:#ff4444;
        }

    </style>

</head>

<body>

    <a href="/logout" class="logout">
        LOGOUT
    </a>

    <div class="title">
        CODEFINDER ADMIN
    </div>

    <div class="top-grid">

        <div class="card">
            <h2>Total Codes</h2>
            <p>{{ data|length }}</p>
        </div>

        <div class="card">
            <h2>Server</h2>
            <p>ONLINE</p>
        </div>

        <div class="card">
            <h2>Status</h2>
            <p>ACTIVE</p>
        </div>

    </div>

    <!-- ADD PANEL -->
    <div class="panel">

        <h3>Add New Code</h3>

        <form method="POST">

            <input
                type="text"
                name="code"
                placeholder="Enter Code"
                required
            >

            <input
                type="text"
                name="phone"
                placeholder="Enter Phone"
                required
            >

            <button type="submit">
                ADD DATA
            </button>

        </form>

    </div>

    <!-- DATABASE -->
    <div class="panel">

        <h3>Database</h3>

        <div class="data-box">

            <table>

                <tr>
                    <th>CODE</th>
                    <th>PHONE</th>
                    <th>DELETE</th>
                </tr>

                {% for code, phone in data.items() %}

                <tr>

                    <td>{{ code }}</td>

                    <td>{{ phone }}</td>

                    <td>

                        <a
                            class="delete-btn"
                            href="/delete/{{ code }}"
                        >
                            DELETE
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>
</html>
