<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Finder</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
#matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    opacity:0.25;
}        


    background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:400px;
            background:#1e293b;
            border-radius:25px;
            padding:25px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            font-size:28px;
        }

        .search-box{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:14px;
            border:none;
            border-radius:15px;
            outline:none;
            background:#334155;
            color:white;
            font-size:16px;
        }

        button{
            padding:14px 18px;
            border:none;
            border-radius:15px;
            background:#3b82f6;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .result{
            margin-top:25px;
            background:#334155;
            padding:18px;
            border-radius:18px;
            text-align:center;
            font-size:18px;
            word-break:break-word;
        }

        .copy-btn{
            width:100%;
            margin-top:15px;
            background:#22c55e;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#94a3b8;
            font-size:13px;
        }
    </style>
</head>

<body>
<canvas id="matrix"></canvas>



<div class="card">

    <h1>🔍 CODE FINDER</h1>

    <form method="POST">

        <div class="search-box">
            <input
                type="text"
                name="query"
                placeholder="Enter Code or Phone"
                required
            >

            <button type="submit">
                Search
            </button>
        </div>

    </form>

    {% if result %}

    <div class="result" id="resultText">
        {{ result }}
    </div>

    <button class="copy-btn" onclick="copyResult()">
        Copy Result
    </button>

    {% endif %}

    <div class="footer">
        Flask Mobile UI
    </div>

</div>

<script>

function copyResult(){

    let text =
    document.getElementById("resultText").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied!");
}

</script>
<script>

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width/fontSize;

const drops = [];

for(let x = 0; x < columns; x++){
    drops[x] = 1;
}

function draw(){

    ctx.fillStyle =
    "rgba(15,23,42,0.08)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle = "#22c55e";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++){

        const text =
        letters[Math.floor(Math.random()*letters.length)];

        ctx.fillText(
            text,
            i * fontSize,
            drops[i] * fontSize
        );

        if(
            drops[i] * fontSize > canvas.height
            &&
            Math.random() > 0.975
        ){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 35);

</script>
</body>
</html>
